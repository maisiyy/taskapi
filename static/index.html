<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 15px; }
    .screen { display: none; } .screen.active { display: block; }
    .wrap { max-width: 420px; margin: 0 auto; padding: 1rem; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    input[type=text], input[type=password] { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 10px; }
    .btn { width: 100%; padding: 9px; border: 1px solid #ddd; border-radius: 8px; background: #f0f0f0; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-primary { background: #534AB7; color: #fff; border-color: #534AB7; }
    .btn-primary:hover { background: #3C3489; }
    .err { color: #cc3333; font-size: 13px; margin-bottom: 8px; display: none; }
    .tab { display: inline-block; padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; }
    .tab.active { background: #EEF2FF; color: #534AB7; font-weight: 500; }
    .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
    .task-item:last-child { border-bottom: none; }
    .task-title { flex: 1; font-size: 14px; }
    .task-title.done { text-decoration: line-through; color: #999; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #d4edda; color: #155724; }
    .badge.pending { background: #fff3cd; color: #856404; }
    .icon-btn { border: none; background: none; cursor: pointer; color: #999; font-size: 18px; padding: 2px 6px; border-radius: 4px; }
    .icon-btn:hover { color: #cc3333; background: #fff0f0; }
    .token-box { background: #f5f5f5; border-radius: 8px; padding: 8px 12px; font-size: 11px; font-family: monospace; color: #666; word-break: break-all; margin-top: 6px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-top: 1rem; }
    .row { display: flex; gap: 8px; }
    .row input { margin: 0; flex: 1; }
    .row .btn { width: auto; padding: 9px 14px; }
  </style>
</head>
<body>

<!-- LOGIN / REGISTER SCREEN -->
<div id="auth-screen" class="screen active">
  <div class="wrap">
    <div style="text-align:center;padding:2rem 0 1.5rem">
      <div style="font-size:36px">✅</div>
      <h1 style="font-size:22px;font-weight:500;margin-top:8px">Task Manager</h1>
      <p style="font-size:13px;color:#888;margin-top:4px">Go + PostgreSQL + JWT</p>
    </div>

    <div style="margin-bottom:1rem">
      <span class="tab active" id="tab-login" onclick="switchTab('login')">Login</span>
      <span class="tab" id="tab-register" onclick="switchTab('register')">Register</span>
    </div>

    <div class="card">
      <p class="err" id="auth-err"></p>
      <input type="text" id="username" placeholder="Username" />
      <input type="password" id="password" placeholder="Password" onkeydown="if(event.key==='Enter')handleAuth()" />
      <button class="btn btn-primary" onclick="handleAuth()">
        <span id="auth-btn-label">Login</span>
      </button>
    </div>
  </div>
</div>

<!-- TASKS SCREEN -->
<div id="tasks-screen" class="screen">
  <div class="wrap">
    <div class="top-bar">
      <div>
        <h2 style="font-size:18px;font-weight:500">My Tasks</h2>
        <p style="font-size:12px;color:#888" id="welcome-msg"></p>
      </div>
      <button class="btn" style="width:auto;padding:6px 14px;font-size:13px" onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <p style="font-size:12px;color:#888;font-weight:500;margin-bottom:4px">JWT Token (stored in memory)</p>
      <div class="token-box" id="token-display">—</div>
    </div>

    <div class="card">
      <div class="row">
        <input type="text" id="new-task" placeholder="Add a new task..." onkeydown="if(event.key==='Enter')addTask()" />
        <button class="btn btn-primary" onclick="addTask()">+ Add</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <p style="font-size:13px;font-weight:500">Tasks</p>
        <span id="task-count" style="font-size:12px;color:#888"></span>
      </div>
      <div id="task-list">
        <p style="text-align:center;color:#888;padding:1rem;font-size:13px">Loading...</p>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:3000'
  let token = null
  let mode = 'login'

  function switchTab(t) {
    mode = t
    document.getElementById('tab-login').className = 'tab' + (t === 'login' ? ' active' : '')
    document.getElementById('tab-register').className = 'tab' + (t === 'register' ? ' active' : '')
    document.getElementById('auth-btn-label').textContent = t === 'login' ? 'Login' : 'Register'
    document.getElementById('auth-err').style.display = 'none'
  }

  function showErr(msg, success = false) {
    const el = document.getElementById('auth-err')
    el.textContent = msg
    el.style.color = success ? 'green' : '#cc3333'
    el.style.display = 'block'
  }

  async function handleAuth() {
    const username = document.getElementById('username').value.trim()
    const password = document.getElementById('password').value.trim()
    if (!username || !password) { showErr('Please fill in all fields'); return }

    try {
      const res = await fetch(API + (mode === 'login' ? '/login' : '/register'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      const data = await res.json()
      if (!res.ok) { showErr(data.error || 'Something went wrong'); return }

      if (mode === 'register') {
        switchTab('login')
        showErr('Registered! Now login.', true)
        return
      }

      token = data.token
      document.getElementById('welcome-msg').textContent = 'Logged in as ' + username
      document.getElementById('token-display').textContent = token.substring(0, 50) + '...'
      showScreen('tasks-screen')
      fetchTasks()
    } catch (e) {
      showErr('Cannot connect to server')
    }
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
    document.getElementById(id).classList.add('active')
  }

  function logout() {
    token = null
    showScreen('auth-screen')
  }

  async function fetchTasks() {
    try {
      const res = await fetch(API + '/tasks', { headers: { Authorization: 'Bearer ' + token } })
      const tasks = await res.json()
      renderTasks(tasks)
    } catch (e) {
      document.getElementById('task-list').innerHTML = '<p style="color:#cc3333;font-size:13px">Failed to load tasks</p>'
    }
  }

  function renderTasks(tasks) {
    const list = document.getElementById('task-list')
    const done = tasks.filter(t => t.done).length
    document.getElementById('task-count').textContent = done + '/' + tasks.length + ' done'

    if (!tasks.length) {
      list.innerHTML = '<p style="text-align:center;color:#888;padding:1rem;font-size:13px">No tasks yet. Add one above!</p>'
      return
    }
    list.innerHTML = tasks.map(t => `
      <div class="task-item">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id}, this.checked)" style="cursor:pointer;width:16px;height:16px" />
        <span class="task-title ${t.done ? 'done' : ''}">${t.title}</span>
        <span class="badge ${t.done ? '' : 'pending'}">${t.done ? 'done' : 'pending'}</span>
        <button class="icon-btn" onclick="deleteTask(${t.id})" title="Delete">🗑</button>
      </div>
    `).join('')
  }

  async function addTask() {
    const input = document.getElementById('new-task')
    const title = input.value.trim()
    if (!title) return
    await fetch(API + '/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ title })
    })
    input.value = ''
    fetchTasks()
  }

  async function toggleTask(id, done) {
    await fetch(API + '/tasks/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ done })
    })
    fetchTasks()
  }

  async function deleteTask(id) {
    await fetch(API + '/tasks/' + id, {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + token }
    })
    fetchTasks()
  }
</script>
</body>
</html>
